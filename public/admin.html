<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTech Innova — Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #028090;
    --mint: #00C9B1;
    --dark: #0D2B30;
    --dark2: #07191C;
    --card: #0F2D32;
    --white: #FFFFFF;
    --border: rgba(0,201,177,0.12);
    --warning: #FFB830;
    --error: #FF4D4D;
    --accent: #FF6B35;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark2);
    color: var(--white);
    display: flex; min-height: 100vh;
  }

  /* SIDEBAR */
  .sidebar {
    width: 250px; flex-shrink: 0;
    background: var(--dark);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 1.5rem 0;
    position: fixed; top: 0; bottom: 0; left: 0;
  }

  .sidebar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 1.2rem;
    color: var(--mint); padding: 0 1.5rem;
    margin-bottom: 0.25rem; display: block; text-decoration: none;
  }
  .sidebar-logo span { color: var(--white); }

  .admin-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: rgba(255,107,53,0.15);
    border: 1px solid rgba(255,107,53,0.25);
    color: var(--accent);
    font-size: 0.65rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 0.2rem 0.6rem; border-radius: 4px;
    margin: 0 1.5rem 2rem;
    width: fit-content;
  }

  .sidebar-section {
    font-size: 0.65rem; font-weight: 600;
    color: rgba(255,255,255,0.25);
    text-transform: uppercase; letter-spacing: 1.5px;
    padding: 0 1.5rem; margin-bottom: 0.5rem;
  }

  .nav-item {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.7rem 1.5rem;
    font-size: 0.875rem; font-weight: 500;
    color: rgba(255,255,255,0.5);
    border-left: 3px solid transparent;
    transition: all 0.2s; cursor: pointer;
    background: none; border-top: none; border-right: none; border-bottom: none;
    width: 100%; text-align: left;
  }

  .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
  .nav-item.active {
    color: var(--mint); background: rgba(0,201,177,0.08);
    border-left-color: var(--mint);
  }

  .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
  .sidebar-spacer { flex: 1; }

  .sidebar-user {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
  }

  .btn-logout {
    display: block; width: 100%; margin-top: 0.5rem;
    padding: 0.5rem; background: rgba(255,77,77,0.1);
    border: 1px solid rgba(255,77,77,0.2);
    color: #FF4D4D; font-size: 0.75rem;
    border-radius: 6px; cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .btn-logout:hover { background: rgba(255,77,77,0.2); }

  /* MAIN */
  .main { margin-left: 250px; flex: 1; display: flex; flex-direction: column; }

  .topbar {
    background: var(--dark); border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 10;
  }

  .topbar-left { display: flex; align-items: center; gap: 1rem; }
  .topbar-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; }

  .live-badge {
    display: flex; align-items: center; gap: 0.4rem;
    font-size: 0.72rem; font-weight: 600;
    color: var(--mint);
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--mint);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .content { padding: 2rem; }

  /* STATS */
  .stats-row {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 1rem; margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem 1.25rem;
    position: relative; overflow: hidden;
  }

  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.green::before { background: var(--mint); }
  .stat-card.orange::before { background: var(--warning); }
  .stat-card.red::before { background: var(--error); }
  .stat-card.blue::before { background: var(--teal); }
  .stat-card.white::before { background: rgba(255,255,255,0.3); }

  .stat-label {
    font-size: 0.7rem; font-weight: 500;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 0.5rem;
  }
  .stat-value {
    font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800;
  }
  .stat-value.green { color: var(--mint); }
  .stat-value.orange { color: var(--warning); }
  .stat-value.red { color: var(--error); }
  .stat-value.white { color: rgba(255,255,255,0.9); }

  /* FILTERS */
  .filters-bar {
    display: flex; gap: 0.75rem; align-items: center;
    margin-bottom: 1.25rem; flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.45rem 1rem; border-radius: 100px;
    font-size: 0.8rem; font-weight: 600;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent; color: rgba(255,255,255,0.5);
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--mint); color: var(--mint); }
  .filter-btn.active { background: var(--mint); color: var(--dark); border-color: var(--mint); }

  .search-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 0.5rem 1rem;
    color: var(--white); font-size: 0.85rem;
    outline: none; width: 220px;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--mint); }
  .search-input::placeholder { color: rgba(255,255,255,0.25); }

  /* TABLE */
  .table-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }

  .table-header {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 0.75rem;
  }

  .table-title { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; }

  table { width: 100%; border-collapse: collapse; }

  th {
    padding: 0.75rem 1.25rem;
    font-size: 0.68rem; font-weight: 600;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase; letter-spacing: 1px;
    text-align: left; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  td {
    padding: 0.9rem 1.25rem; font-size: 0.85rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .status-badge {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.25rem 0.7rem; border-radius: 100px;
    font-size: 0.7rem; font-weight: 600;
  }
  .status-badge::before { content:''; width:5px; height:5px; border-radius:50%; }

  .s-entregado { background:rgba(0,201,177,0.1); color:var(--mint); }
  .s-entregado::before { background:var(--mint); }
  .s-proceso { background:rgba(255,184,48,0.1); color:var(--warning); }
  .s-proceso::before { background:var(--warning); }
  .s-pendiente { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.4); }
  .s-pendiente::before { background:rgba(255,255,255,0.25); }
  .s-cancelado { background:rgba(255,77,77,0.1); color:var(--error); }
  .s-cancelado::before { background:var(--error); }

  /* INST STATUS BADGES */
  .inst-status {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.2rem 0.6rem; border-radius: 100px;
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
  }
  .inst-status::before { content:''; width:5px; height:5px; border-radius:50%; }
  .inst-status.activo { background:rgba(0,201,177,0.12); color:var(--mint); }
  .inst-status.activo::before { background:var(--mint); }
  .inst-status.pendiente { background:rgba(255,184,48,0.12); color:var(--warning); }
  .inst-status.pendiente::before { background:var(--warning); }
  .inst-status.inactivo { background:rgba(255,77,77,0.1); color:var(--error); }
  .inst-status.inactivo::before { background:var(--error); }

  .action-btn {
    padding: 0.3rem 0.7rem; border-radius: 6px;
    font-size: 0.72rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; border: 1px solid;
    margin-right: 0.3rem;
  }

  .btn-confirm {
    background: rgba(0,201,177,0.1); border-color: rgba(0,201,177,0.3);
    color: var(--mint);
  }
  .btn-confirm:hover { background: rgba(0,201,177,0.2); }

  .btn-deliver {
    background: rgba(0,201,177,0.15); border-color: var(--mint);
    color: var(--mint);
  }
  .btn-deliver:hover { background: var(--mint); color: var(--dark); }

  .btn-cancel {
    background: rgba(255,77,77,0.08); border-color: rgba(255,77,77,0.2);
    color: var(--error);
  }
  .btn-cancel:hover { background: rgba(255,77,77,0.2); }

  .btn-primary {
    background: var(--mint); border: none;
    color: var(--dark); padding: 0.5rem 1.2rem;
    border-radius: 8px; font-size: 0.8rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 100; display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--dark); border: 1px solid var(--border);
    border-radius: 20px; padding: 2rem; width: 100%; max-width: 520px;
    margin: 1rem; position: relative; animation: slideUp 0.3s ease;
    max-height: 90vh; overflow-y: auto;
  }

  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .modal-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:1.25rem; }
  .modal-close {
    position:absolute; top:1rem; right:1rem;
    background:none; border:none; color:rgba(255,255,255,0.3);
    font-size:1.2rem; cursor:pointer;
  }
  .modal-close:hover { color: var(--white); }

  .detail-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:0.6rem 0; border-bottom:1px solid rgba(255,255,255,0.06);
    font-size:0.875rem;
  }
  .detail-row:last-of-type { border-bottom:none; }
  .detail-key { color:rgba(255,255,255,0.4); }
  .detail-val { font-weight:500; text-align:right; max-width:60%; }

  /* FORM */
  .form-group { margin-bottom: 1rem; }
  .form-label { display:block; font-size:0.75rem; font-weight:600; color:rgba(255,255,255,0.5); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.5px; }
  .form-input, .form-select {
    width:100%; background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:8px; padding:0.6rem 0.9rem;
    color:var(--white); font-size:0.875rem; outline:none;
    transition:border-color 0.2s; font-family:'DM Sans',sans-serif;
  }
  .form-input:focus, .form-select:focus { border-color:var(--mint); }
  .form-input::placeholder { color:rgba(255,255,255,0.2); }
  .form-select option { background:var(--dark); color:var(--white); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; }

  /* INSTITUCIONES TABLE */
  .inst-empty {
    text-align:center; padding:3rem;
    color:rgba(255,255,255,0.3);
  }
  .inst-empty p { margin-top:0.5rem; font-size:0.875rem; }

  /* TOAST */
  .alert-toast {
    position:fixed; bottom:2rem; right:2rem;
    background:var(--dark); border:1px solid var(--mint);
    color:var(--mint); padding:1rem 1.5rem;
    border-radius:10px; font-size:0.875rem;
    transform:translateY(100px); opacity:0;
    transition:all 0.4s; z-index:999;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    max-width:320px;
  }
  .alert-toast.show { transform:translateY(0); opacity:1; }
  .alert-toast.error { border-color:var(--error); color:var(--error); }

  /* LOADING */
  .loading-spinner {
    display:inline-block; width:16px; height:16px;
    border:2px solid rgba(0,201,177,0.2);
    border-top-color:var(--mint);
    border-radius:50%;
    animation:spin 0.7s linear infinite;
    margin-right:0.5rem; vertical-align:middle;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  @media(max-width:1200px) { .stats-row { grid-template-columns:repeat(3,1fr); } }
  @media(max-width:768px) { .sidebar{display:none;} .main{margin-left:0;} .form-row{grid-template-columns:1fr;} }
</style>
</head>
<body>

<aside class="sidebar">
  <a href="index.html" class="sidebar-logo">EduTech<span>Innova</span></a>
  <div class="admin-badge">🔑 Admin</div>

  <div class="sidebar-section">Gestión</div>
  <button class="nav-item active" data-view="pedidos" onclick="switchAdminView('pedidos')">
    <span class="nav-icon">📦</span> Todos los pedidos
  </button>
  <button class="nav-item" data-view="instituciones" onclick="switchAdminView('instituciones')">
    <span class="nav-icon">🏫</span> Instituciones
  </button>
  <button class="nav-item" data-view="metricas" onclick="switchAdminView('metricas')">
    <span class="nav-icon">📊</span> Métricas
  </button>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-user">
    <div style="font-size:0.8rem;font-weight:600;">Administrador</div>
    <div style="font-size:0.7rem;color:var(--accent);margin-top:0.2rem;">EduTech Innova</div>
    <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title" id="admin-topbar-title">Todos los pedidos</div>
      <div class="live-badge"><div class="live-dot"></div> En vivo</div>
    </div>
    <div style="font-size:0.8rem;color:rgba(255,255,255,0.3);">
      Hoy: <span id="today-date"></span>
    </div>
  </div>

  <div class="content">

    <div class="stats-row">
      <div class="stat-card white">
        <div class="stat-label">Total pedidos</div>
        <div class="stat-value white" id="admin-total">—</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-label">Pendientes</div>
        <div class="stat-value orange" id="admin-pendientes">—</div>
      </div>
      <div class="stat-card orange">
        <div class="stat-label">En proceso</div>
        <div class="stat-value orange" id="admin-proceso">—</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Entregados</div>
        <div class="stat-value green" id="admin-entregados">—</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Instituciones</div>
        <div class="stat-value" style="color:var(--teal);" id="admin-instituciones">—</div>
      </div>
    </div>

    <!-- VISTA: PEDIDOS -->
    <div id="admin-view-pedidos">
      <div class="filters-bar">
        <button class="filter-btn active" onclick="filterOrders('todos', this)">Todos</button>
        <button class="filter-btn" onclick="filterOrders('pendiente', this)">Pendientes</button>
        <button class="filter-btn" onclick="filterOrders('proceso', this)">En proceso</button>
        <button class="filter-btn" onclick="filterOrders('entregado', this)">Entregados</button>
        <input class="search-input" type="text" placeholder="🔍 Buscar institución..." oninput="searchOrders(this.value)">
      </div>
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">Pedidos de impresión</div>
          <div style="font-size:0.8rem;color:rgba(255,255,255,0.3);" id="order-count">— pedidos</div>
        </div>
        <div id="admin-orders-container">
          <div class="inst-empty">
            <span class="loading-spinner"></span> Cargando pedidos...
          </div>
        </div>
      </div>
    </div>

    <!-- VISTA: INSTITUCIONES -->
    <div id="admin-view-instituciones" style="display:none;">
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">🏫 Instituciones registradas</div>
          <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;">
            <input class="search-input" type="text" placeholder="🔍 Buscar institución..." oninput="searchInstituciones(this.value)" style="width:200px;">
            <button class="btn-primary" onclick="openAgregarModal()">+ Agregar institución</button>
            <button onclick="cargarInstituciones()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:0.5rem 0.9rem;border-radius:8px;font-size:0.8rem;cursor:pointer;" title="Recargar desde Supabase">🔄 Actualizar</button>
          </div>
        </div>
        <div id="inst-table-container">
          <div class="inst-empty">
            <span class="loading-spinner"></span> Cargando instituciones...
          </div>
        </div>
      </div>
    </div>

    <!-- VISTA: MÉTRICAS -->
    <div id="admin-view-metricas" style="display:none;">
      <div id="metrics-grid-container"></div>
    </div>

  </div>
</div>

<!-- MODAL DETALLE PEDIDO / INSTITUCIÓN -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">Detalle</div>
    <div id="modal-content"></div>
    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;" id="modal-actions"></div>
  </div>
</div>

<!-- MODAL AGREGAR INSTITUCIÓN -->
<div class="modal-overlay" id="modal-agregar" onclick="closeAgregarModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeAgregarModal()">✕</button>
    <div class="modal-title">➕ Agregar institución</div>
    <div id="form-error" style="display:none;background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.2);color:var(--error);padding:0.75rem;border-radius:8px;font-size:0.8rem;margin-bottom:1rem;"></div>

    <div class="form-group">
      <label class="form-label">Nombre de la institución *</label>
      <input class="form-input" id="f-nombre" type="text" placeholder="Ej: Colegio San Martín">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Responsable *</label>
        <input class="form-input" id="f-responsable" type="text" placeholder="Nombre completo">
      </div>
      <div class="form-group">
        <label class="form-label">Cargo</label>
        <input class="form-input" id="f-cargo" type="text" placeholder="Ej: Director">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input class="form-input" id="f-telefono" type="tel" placeholder="+51 999 000 111">
      </div>
      <div class="form-group">
        <label class="form-label">Plan</label>
        <select class="form-select" id="f-plan">
          <option value="BASIC">BASIC</option>
          <option value="START">START</option>
          <option value="PRO">PRO</option>
          <option value="GOLD">GOLD</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="f-email" type="email" placeholder="contacto@colegio.pe">
    </div>
    <div class="form-group">
      <label class="form-label">Dirección</label>
      <input class="form-input" id="f-direccion" type="text" placeholder="Av. Principal 123, Lima">
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1.5rem;">
      <button onclick="closeAgregarModal()" style="flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:0.65rem;border-radius:8px;font-size:0.875rem;cursor:pointer;">Cancelar</button>
      <button class="btn-primary" id="btn-guardar" onclick="guardarInstitucion()" style="flex:2;">Guardar institución</button>
    </div>
  </div>
</div>

<div class="alert-toast" id="toast"></div>

<script>
// =============================================
// CONFIGURACIÓN SUPABASE

async function cargarInstituciones() {
  const container = document.getElementById('inst-table-container');
  if (container) {
    container.innerHTML = `<div class="inst-empty"><span class="loading-spinner"></span> Cargando desde Supabase...</div>`;
  }

  try {
    // 🔑 FIX PRINCIPAL: usamos el token correcto en Authorization
    const authToken = getAuthToken();

    const response = await fetch(`${SUPABASE_URL}/rest/v1/institucion?select=*&order=created_at.desc`, {
      headers: {
        'apikey':        SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${authToken}`,
        'Content-Type':  'application/json'
      }
    });

    if (!response.ok) {
      const err = await response.json();
      console.error('Supabase error:', err);
      throw new Error(err.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    console.log('Instituciones cargadas de Supabase:', data);

    // ✅ Mapea los campos de tu tabla Supabase al formato del panel
    // Ajusta los nombres de columna según tu tabla real en Supabase
    institucionesSupabase = (Array.isArray(data) ? data : []).map(i => ({
      id:           i.id            ?? i.institucion_id ?? null,
      nombre:       i.nombre_institucion ?? i.nombre  ?? 'Sin nombre',
      responsable:  i.nombre_responsable ?? i.responsable ?? '—',
      cargo:        i.cargo         ?? 'Directivo',
      plan:         i.plan          ?? 'BASIC',
      telefono:     i.telefono      ?? '—',
      email:        i.email         ?? '—',
      direccion:    i.direccion     ?? '—',
      estado:       i.estado        ?? 'activo',
      created_at:   i.created_at    ?? null,
      pedidos:      i.pedidos_count ?? 0,
      fuente:       'supabase'
    }));

    todasLasInstituciones = [...institucionesSupabase];
    renderInstTable(todasLasInstituciones);
    updateStats();
    showToast(`✅ ${institucionesSupabase.length} institución(es) cargada(s)`);

  } catch (e) {
    console.error('Error cargando instituciones:', e);
    showToast('❌ Error al cargar: ' + e.message, true);

    if (container) {
      container.innerHTML = `
        <div class="inst-empty">
          <div style="font-size:1.5rem;">⚠️</div>
          <p style="margin-top:0.5rem;color:var(--error);">Error al conectar con Supabase</p>
          <p style="font-size:0.75rem;margin-top:0.25rem;opacity:0.6;">${e.message}</p>
          <button onclick="cargarInstituciones()" class="btn-primary" style="margin-top:1rem;">Reintentar</button>
        </div>`;
    }
  }
}

async function guardarInstitucion() {
  const nombre      = document.getElementById('f-nombre').value.trim();
  const responsable = document.getElementById('f-responsable').value.trim();
  const cargo       = document.getElementById('f-cargo').value.trim();
  const telefono    = document.getElementById('f-telefono').value.trim();
  const email       = document.getElementById('f-email').value.trim();
  const plan        = document.getElementById('f-plan').value;
  const direccion   = document.getElementById('f-direccion').value.trim();

  const errEl = document.getElementById('form-error');
  errEl.style.display = 'none';

  if (!nombre) {
    errEl.textContent = '⚠️ El nombre de la institución es obligatorio.';
    errEl.style.display = 'block';
    return;
  }
  if (!responsable) {
    errEl.textContent = '⚠️ El nombre del responsable es obligatorio.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> Guardando...';

  // ✅ Ajusta los nombres de columna según tu tabla en Supabase
  const payload = {
    nombre_institucion:  nombre,
    nombre_responsable:  responsable,
    cargo:               cargo   || null,
    telefono:            telefono || null,
    email:               email    || null,
    plan:                plan,
    direccion:           direccion || null,
    estado:              'activo'
  };

  try {
    const authToken = getAuthToken();
    const response = await fetch(`${SUPABASE_URL}/rest/v1/institucion`, {
      method: 'POST',
      headers: {
        'apikey':        SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${authToken}`,
        'Content-Type':  'application/json',
        'Prefer':        'return=representation'   // ← devuelve el registro creado
      },
      body: JSON.stringify(payload)
    });

    if (!response.ok) {
      const err = await response.json();
      console.error('Error Supabase INSERT:', err);
      throw new Error(err.message || err.details || `HTTP ${response.status}`);
    }

    const created = await response.json();
    console.log('Institución creada:', created);

    closeAgregarModal();
    showToast(`✅ Institución "${nombre}" agregada correctamente`);
    await cargarInstituciones();   // recarga la tabla desde Supabase

  } catch (e) {
    console.error('Error guardando:', e);
    errEl.textContent = '❌ Error al guardar: ' + e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Guardar institución';
  }
}

// =============================================
// ACTIVAR INSTITUCIÓN
// =============================================
async function activarInstitucion(id) {
  try {
    const authToken = getAuthToken();
    const response = await fetch(`${SUPABASE_URL}/rest/v1/institucion?id=eq.${id}`, {
      method: 'PATCH',
      headers: {
        'apikey':        SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${authToken}`,
        'Content-Type':  'application/json'
      },
      body: JSON.stringify({ estado: 'activo' })
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    showToast('✅ Institución activada');
    await cargarInstituciones();
  } catch (e) {
    showToast('❌ Error al activar: ' + e.message, true);
  }
}

// =============================================
// ELIMINAR INSTITUCIÓN
// =============================================
async function eliminarInstitucion(id, nombre) {
  if (!confirm(`¿Eliminar "${nombre}"?\nEsta acción no se puede deshacer.`)) return;
  try {
    const authToken = getAuthToken();
    const response = await fetch(`${SUPABASE_URL}/rest/v1/institucion?id=eq.${id}`, {
      method: 'DELETE',
      headers: {
        'apikey':        SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${authToken}`
      }
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    showToast(`🗑️ Institución eliminada`);
    await cargarInstituciones();
  } catch (e) {
    showToast('❌ Error al eliminar: ' + e.message, true);
  }
}

function filterOrders(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function searchOrders(query) {
  currentSearch = query.toLowerCase();
  applyFilters();
}

function applyFilters() {
  let filtered = allOrders;
  if (currentFilter !== 'todos') filtered = filtered.filter(o => o.estado === currentFilter);
  if (currentSearch) filtered = filtered.filter(o => o.institucion.toLowerCase().includes(currentSearch));
  renderOrdersTable(filtered);
}

function updateStatus(id, newStatus) {
  const order = allOrders.find(o => o.id === id);
  if (order) { order.estado = newStatus; applyFilters(); updateStats(); showToast(`✅ Pedido ${id} actualizado`); }
}

function updateStats() {
  document.getElementById('admin-total').textContent       = allOrders.length;
  document.getElementById('admin-pendientes').textContent  = allOrders.filter(o=>o.estado==='pendiente').length;
  document.getElementById('admin-proceso').textContent     = allOrders.filter(o=>o.estado==='proceso').length;
  document.getElementById('admin-entregados').textContent  = allOrders.filter(o=>o.estado==='entregado').length;
  document.getElementById('admin-instituciones').textContent = institucionesSupabase.length;
}

function escHtml(str) {
  if (!str) return '—';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'alert-toast show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = 'alert-toast'; }, 4000);
}

function logout() {
  localStorage.clear();

}
